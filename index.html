<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="משימות">
<title>מנהל משימות</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1525;
  --surface: #141a2e;
  --surface2: #1a2340;
  --surface3: #202b4d;
  --border: #2a3555;
  --border2: #364265;
  --text: #e8eef8;
  --text2: #8896b3;
  --text3: #5a6a8a;
  --accent: #4f8ef7;
  --accent2: #7b5cf0;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --purple: #a78bfa;
  --orange: #fb923c;
  --cyan: #22d3ee;
  --r: 12px;
  --r2: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
  --shadow2: 0 2px 12px rgba(0,0,0,.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overscroll-behavior: none;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* HEADER */
.header {
  background: rgba(10,14,26,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 1.15rem;
  font-weight: 900;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-right { display: flex; align-items: center; gap: 8px; }

.header-stats { display: flex; gap: 6px; align-items: center; }

.stat-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: .72rem;
  font-weight: 700;
  border: 1px solid;
}
.stat-open { background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.3); color: var(--green); }
.stat-overdue { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); color: var(--red); }
.stat-done { background: rgba(79,142,247,.1); border-color: rgba(79,142,247,.3); color: var(--accent); }

.btn-reminder {
  background: rgba(251,191,36,.1);
  border: 1px solid rgba(251,191,36,.3);
  color: var(--yellow);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: 'Heebo', sans-serif;
  font-size: .75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.btn-reminder:hover { background: rgba(251,191,36,.2); }
.btn-reminder:disabled { opacity: .5; }

/* OFFLINE BANNER */
.offline-banner {
  display: none;
  background: rgba(251,191,36,.15);
  border-bottom: 1px solid rgba(251,191,36,.3);
  color: var(--yellow);
  font-size: .78rem;
  font-weight: 600;
  padding: 8px 20px;
  text-align: center;
}
.offline-banner.show { display: block; }

/* SYNC INDICATOR */
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  transition: background .3s;
}
.sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* CONTAINER */
.container { max-width: 860px; margin: 0 auto; padding: 20px 16px 100px; }

/* VIEW TOGGLE */
.view-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 5px;
}
.view-btn {
  flex: 1;
  padding: 7px 12px;
  border-radius: 8px;
  border: none;
  background: none;
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.view-btn.on { background: var(--surface2); color: var(--text); box-shadow: var(--shadow2); }

/* ADD TASK CARD */
.add-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 20px;
  transition: border-color .2s;
}
.add-card:focus-within { border-color: var(--accent); }

.add-card-title {
  font-size: .72rem;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.form-full { grid-column: 1 / -1; }

.input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: .86rem;
  padding: 9px 12px;
  outline: none;
  width: 100%;
  transition: border-color .2s;
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text3); }
select.input option { background: #1a2340; }
textarea.input { resize: vertical; min-height: 56px; }

.form-row-inline { display: flex; gap: 8px; margin-bottom: 8px; }
.form-row-inline .input { flex: 1; }

/* TAGS INPUT */
.tags-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 6px 10px;
  cursor: text;
  transition: border-color .2s;
  min-height: 40px;
}
.tags-wrap:focus-within { border-color: var(--accent); }
.tags-input { background: none; border: none; color: var(--text); font-family: 'Heebo', sans-serif; font-size: .84rem; outline: none; min-width: 100px; flex: 1; }
.tag-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: .68rem;
  font-weight: 700;
  cursor: pointer;
}
.tag-chip .x { opacity: .6; font-size: .65rem; }

/* RECURRING */
.recur-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.recur-label { font-size: .8rem; color: var(--text2); display: flex; align-items: center; gap: 6px; cursor: pointer; }
.recur-label input[type=checkbox] { accent-color: var(--purple); width: 15px; height: 15px; }
.days-grid { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.day-btn {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: .74rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.day-btn.sel { background: rgba(167,139,250,.2); border-color: var(--purple); color: var(--purple); }

.add-btn-row { display: flex; justify-content: flex-start; }
.btn-add {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: var(--r2);
  color: white;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: .86rem;
  font-weight: 700;
  padding: 9px 22px;
  transition: opacity .2s, transform .1s;
}
.btn-add:hover { opacity: .9; transform: translateY(-1px); }
.btn-add:disabled { opacity: .4; }

/* FILTERS */
.filters-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 14px;
}
.filter-btn {
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.filter-btn.on { background: var(--accent); border-color: var(--accent); color: white; }
.filter-btn.on-red { background: var(--red); border-color: var(--red); color: white; }

.search-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: .8rem;
  padding: 5px 13px;
  outline: none;
  flex: 1;
  min-width: 140px;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent); }

select.filter-sel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: .78rem;
  padding: 5px 13px;
  outline: none;
  cursor: pointer;
}

/* SECTION HEADER */
.section-hdr {
  font-size: .7rem;
  font-weight: 800;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 0 4px;
  margin-bottom: 8px;
  margin-top: 4px;
}

/* TASK CARD */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 13px 15px;
  margin-bottom: 6px;
  display: flex;
  gap: 11px;
  align-items: flex-start;
  transition: border-color .2s, transform .15s, opacity .3s;
  position: relative;
  overflow: hidden;
}
.task-card::before {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 0 3px 3px 0;
  opacity: 0;
  transition: opacity .2s;
}
.task-card.pri-high::before { background: var(--red); opacity: 1; }
.task-card.pri-mid::before { background: var(--yellow); opacity: .7; }
.task-card:hover { border-color: var(--border2); transform: translateX(-2px); }
.task-card.done { opacity: .45; }
.task-card.done .task-title { text-decoration: line-through; color: var(--text2); }

.task-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .75rem;
  color: transparent;
  font-weight: 900;
}
.task-check:hover { border-color: var(--green); background: rgba(52,211,153,.1); }
.task-check.checked { background: var(--green); border-color: var(--green); color: #0a0e1a; }

.task-body { flex: 1; min-width: 0; }
.task-title { font-size: .9rem; font-weight: 600; margin-bottom: 3px; }
.task-desc { font-size: .78rem; color: var(--text2); margin-bottom: 6px; line-height: 1.5; }
.task-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: .68rem;
  font-weight: 700;
  white-space: nowrap;
}
.b-high { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
.b-low  { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
.b-date { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.b-overdue { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
.b-today { background: rgba(251,191,36,.12); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
.b-proj { background: rgba(79,142,247,.1); color: var(--accent); border: 1px solid rgba(79,142,247,.2); }
.b-assign { background: rgba(167,139,250,.1); color: var(--purple); border: 1px solid rgba(167,139,250,.2); }
.b-recur { background: rgba(167,139,250,.12); color: var(--purple); border: 1px solid rgba(167,139,250,.2); }
.b-time { background: rgba(34,211,238,.1); color: var(--cyan); border: 1px solid rgba(34,211,238,.2); }
.b-offline { background: rgba(251,191,36,.1); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }

.task-actions {
  display: flex;
  gap: 4px;
  align-items: flex-start;
  flex-shrink: 0;
}
.btn-icon {
  background: none;
  border: 1px solid transparent;
  border-radius: 7px;
  color: var(--text3);
  cursor: pointer;
  font-size: .78rem;
  padding: 4px 7px;
  transition: all .2s;
  line-height: 1;
}
.btn-icon:hover { border-color: var(--border); color: var(--text2); background: var(--surface2); }
.btn-del:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,.08); }
.btn-cal:hover { border-color: var(--green); color: var(--green); background: rgba(52,211,153,.08); }

/* EMPTY */
.empty { text-align: center; padding: 56px 20px; color: var(--text3); }
.empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .5; }
.empty-text { font-size: .9rem; }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

/* CALENDAR */
.cal-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  display: none;
}
.cal-wrap.show { display: block; }
.cal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.cal-hdr h3 { font-size: .95rem; font-weight: 700; }
.cal-nav {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  padding: 5px 12px;
  font-size: .9rem;
  transition: all .2s;
}
.cal-nav:hover { border-color: var(--accent); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-day-name { font-size: .68rem; color: var(--text3); text-align: center; padding: 4px 2px; font-weight: 700; }
.cal-cell {
  min-height: 60px;
  border-radius: 8px;
  padding: 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .2s;
}
.cal-cell:hover { border-color: var(--accent); }
.cal-cell.today { border-color: var(--accent); background: rgba(79,142,247,.08); }
.cal-cell.other-month { opacity: .25; }
.cal-cell-num { font-size: .72rem; color: var(--text2); margin-bottom: 3px; }
.cal-cell.today .cal-cell-num { color: var(--accent); font-weight: 800; }
.cal-dot {
  font-size: .6rem;
  border-radius: 3px;
  padding: 1px 4px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cal-dot.high { background: rgba(248,113,113,.25); color: #ff9090; }
.cal-dot.mid  { background: rgba(251,191,36,.2); color: var(--yellow); }
.cal-dot.low  { background: rgba(52,211,153,.15); color: var(--green); }

/* MODAL */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.overlay.on { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px;
  width: 100%;
  max-width: 460px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,.5);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(.95) translateY(10px); } to { opacity:1; transform:none; } }
.modal h3 { font-size: .95rem; font-weight: 700; margin-bottom: 16px; }
.modal label { font-size: .75rem; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 10px; }
.modal .input { width: 100%; }
.modal-btns { display: flex; gap: 8px; margin-top: 18px; }
.modal-btns button {
  flex: 1;
  border: none;
  border-radius: var(--r2);
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: .86rem;
  font-weight: 700;
  padding: 10px;
  transition: opacity .2s;
}
.modal-btns button:hover { opacity: .9; }
.btn-save { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
.btn-cancel { background: var(--surface2); color: var(--text2); border: 1px solid var(--border) !important; }
.btn-green { background: var(--green); color: #0a0e1a; }

/* CONFIRM MODAL */
.confirm-icon { font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
.confirm-title { font-size: 1rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
.confirm-sub { font-size: .82rem; color: var(--text2); text-align: center; margin-bottom: 4px; }

/* TOAST */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 30px;
  color: var(--text);
  font-size: .82rem;
  font-weight: 600;
  padding: 10px 22px;
  z-index: 999;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: var(--shadow);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* INSTALL BANNER */
#installBanner {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 14px;
  padding: 14px 18px;
  z-index: 900;
  box-shadow: var(--shadow);
  min-width: 280px;
  max-width: 340px;
}
#installBanner.show { display: flex; gap: 12px; align-items: center; }
.install-text { flex: 1; font-size: .82rem; color: var(--text2); }
.install-text strong { color: var(--text); display: block; margin-bottom: 2px; }
.btn-install {
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: .8rem;
  font-weight: 700;
  padding: 7px 14px;
  white-space: nowrap;
}
.btn-dismiss { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1rem; flex-shrink: 0; }

@media (max-width: 600px) {
  .header { padding: 0 14px; }
  .header-stats .stat-chip:not(.stat-open) { display: none; }
  .stat-chip { font-size: .68rem; padding: 3px 8px; }
  .btn-reminder { font-size: .72rem; padding: 4px 9px; }
  .container { padding: 14px 12px 90px; }
  .form-grid { grid-template-columns: 1fr; }
  .logo { font-size: 1rem; }
  .cal-cell { min-height: 48px; }
}
</style>
</head>

      <input class="search-input" id="searchBox" placeholder="🔍 חיפוש..." oninput="renderTasks()">
      <select class="filter-sel" id="tagFilter" onchange="renderTasks()">

    <select class="input" id="ePri">
      <option value="גבוהה">🔴 דחוף</option>
      <option value="בינונית">🟡 רגיל</option>

        <button class="day-btn" data-day="0">ראשון</button>
        <button class="day-btn" data-day="1">שני</button>
        <button class="day-btn" data-day="2">שלישי</button>
        <button class="day-btn" data-day="3">רביעי</button>
        <button class="day-btn" data-day="4">חמישי</button>
        <button class="day-btn" data-day="5">שישי</button>
        <button class="day-btn" data-day="6">שבת</button>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-save" onclick="saveEdit()">💾 שמור</button>
      <button class="btn-cancel" onclick="closeEdit()">ביטול</button>
    </div>

<!-- DAY MODAL -->
<div class="overlay" id="dayModal">
  <div class="modal" style="max-width:500px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 id="dayModalTitle" style="margin:0"></h3>
      <button onclick="document.getElementById('dayModal').classList.remove('on')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.2rem;line-height:1">✕</button>

</div>

<div class="overlay" id="confirmModal">
  <div class="modal" style="max-width:360px">
    <div class="confirm-icon">✅</div>
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-sub">לאשר שהמשימה הושלמה ונסגרה?</div>
    <div class="modal-btns">
      <button class="btn-green" onclick="confirmDone()">✅ כן, נסגרה</button>
      <button class="btn-cancel" onclick="closeConfirm()">ביטול</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- INSTALL BANNER -->
<div id="installBanner">
  <div class="install-text">
    <strong>📲 התקן את האפליקציה</strong>
    גישה מהירה ממסך הבית
  </div>
  <button class="btn-install" onclick="installApp()">התקן</button>
  <button class="btn-dismiss" onclick="dismissInstall()">✕</button>
</div>

<script>
// ===== STATE =====
var tasks = [];
var currentFilter = 'all';
var editingId = null;
var _newTags = [], _editTags = [];
var _pendingId = null;
var calYear, calMonth;
var isOnline = navigator.onLine;
var pendingSync = [];
var deferredPrompt = null;

var TAG_COLORS = ['#f97316','#06b6d4','#8b5cf6','#ec4899','#10b981','#f59e0b','#3b82f6','#ef4444'];
var APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE'; // ← החלף בכתובת ה-Web App שלך

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(function(reg) { console.log('SW registered'); })
    .catch(function(e) { console.log('SW failed:', e); });
}

// ===== ONLINE/OFFLINE =====
window.addEventListener('online', function() {
  isOnline = true;
  document.getElementById('offlineBanner').classList.remove('show');
  setSyncStatus('syncing');
  syncPending();
});
window.addEventListener('offline', function() {
  isOnline = false;
  document.getElementById('offlineBanner').classList.add('show');
  setSyncStatus('error');
});

function setSyncStatus(s) {
  var dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (s ? ' ' + s : '');
}

// ===== PWA INSTALL =====
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('installDismissed')) {
    setTimeout(function() {
      document.getElementById('installBanner').classList.add('show');
    }, 3000);
  }
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r) {
    deferredPrompt = null;
    dismissInstall();
  });
}
function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('installDismissed', '1');
}

// ===== INIT =====
function init() {
  setTimeout(function() {
    var s = document.getElementById('splashScreen');
    if (s) { s.style.opacity='0'; setTimeout(function(){ s.style.display='none'; },500); }
  }, 1400);

  document.getElementById('newDeadline').value = new Date().toISOString().split('T')[0];

  // Day buttons click
  document.querySelectorAll('.day-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { this.classList.toggle('sel'); });
  });

  // Load from local cache first (instant display)
  var cached = localStorage.getItem('tasks_cache');
  if (cached) {
    try { tasks = JSON.parse(cached); renderTasks(); updateStats(); refreshLists(); } catch(e) {}
  }

  if (!navigator.onLine) {
    document.getElementById('offlineBanner').classList.add('show');
    setSyncStatus('error');
    return;
  }

  loadTasks();
}

// ===== LOAD =====
function loadTasks() {
  setSyncStatus('syncing');
  apiCall('getTasks', null, function(data) {
    tasks = data || [];
    localStorage.setItem('tasks_cache', JSON.stringify(tasks));
    renderTasks();
    updateStats();
    refreshLists();
    setSyncStatus('');
  }, function(e) {
    setSyncStatus('error');
    showToast('שגיאה בטעינה — מציג מטמון', var_red);
  });
}

// ===== API CALL =====
function apiCall(action, payload, onSuccess, onError) {
  var url = APPS_SCRIPT_URL + '?action=' + action;
  var opts = { method: 'GET' };
  if (payload) {
    opts.method = 'POST';
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(payload);
  }
  fetch(url, opts)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { if (onError) onError({ message: d.error }); }
      else { if (onSuccess) onSuccess(d.data !== undefined ? d.data : d); }
    })
    .catch(function(e) { if (onError) onError(e); });
}

var var_red = '#f87171';
var var_green = '#34d399';

// ===== OFFLINE QUEUE =====
function queueSync(type, data) {
  pendingSync.push({ type: type, data: data, ts: Date.now() });
  localStorage.setItem('pending_sync', JSON.stringify(pendingSync));
}

function syncPending() {
  if (!pendingSync.length) { setSyncStatus(''); return; }
  // Re-save all tasks (simplest strategy)
  apiCall('saveTasks', { tasks: tasks }, function() {
    pendingSync = [];
    localStorage.removeItem('pending_sync');
    setSyncStatus('');
    showToast('✅ סונכרן בהצלחה', var_green);
  }, function() {
    setSyncStatus('error');
  });
}

// ===== ADD TASK =====
function addTask() {
  var title = document.getElementById('newTitle').value.trim();
  if (!title) { showToast('נא להזין כותרת', var_red); return; }

  var isRecur = document.getElementById('chkRecur').checked;
  var recurDays = [];
  if (isRecur) {
    document.querySelectorAll('#recurDays .day-btn.sel').forEach(function(b) {
      recurDays.push(parseInt(b.dataset.day));
    });
    if (!recurDays.length) { showToast('בחר לפחות יום אחד', var_red); return; }
  }

  var task = {
    id: Date.now(),
    title: title,
    desc: document.getElementById('newDesc').value.trim(),
    project: document.getElementById('newProject').value.trim(),
    priority: document.getElementById('newPriority').value,
    deadline: document.getElementById('newDeadline').value,
    time: document.getElementById('newTime').value || '',
    assign: document.getElementById('newAssign').value.trim(),
    tags: _newTags.slice(),
    done: false,
    recurring: isRecur,
    recurDays: recurDays,
    createdAt: new Date().toISOString(),
    _pendingSync: !isOnline
  };

  tasks.unshift(task);
  localStorage.setItem('tasks_cache', JSON.stringify(tasks));
  renderTasks(); updateStats(); refreshLists();
  resetAddForm();

  if (!isOnline) {
    queueSync('add', task);
    showToast('💾 נשמר לוקאלית — יסונכרן כשיחזור חיבור', var_red);
    return;
  }

  setSyncStatus('syncing');
  apiCall('saveTask', { task: task }, function() {
    task._pendingSync = false;
    localStorage.setItem('tasks_cache', JSON.stringify(tasks));
    setSyncStatus('');
    showToast('✅ משימה נוספה!', var_green);
  }, function(e) {
    setSyncStatus('error');
    queueSync('add', task);
    showToast('⚠️ נשמר לוקאלית', var_red);
  });
}

function resetAddForm() {
  ['newTitle','newDesc','newProject','newAssign','newTime'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  document.getElementById('newDeadline').value = new Date().toISOString().split('T')[0];
  document.getElementById('newPriority').value = 'בינונית';
  document.getElementById('chkRecur').checked = false;
  document.getElementById('recurDays').style.display = 'none';
  document.querySelectorAll('#recurDays .day-btn').forEach(function(b) { b.classList.remove('sel'); });
  _newTags = []; renderTagsDisplay('new');
}

// ===== TOGGLE DONE =====
function toggleDone(id) {
  var t = tasks.find(function(x) { return x.id == id; });
  if (!t) return;
  if (t.done) {
    t.done = false;
    persist(function() { showToast('📂 משימה נפתחה מחדש'); });
    renderTasks(); updateStats();
    return;
  }
  _pendingId = t.id;
  document.getElementById('confirmTitle').textContent = t.title;
  document.getElementById('confirmModal').classList.add('on');
}

function confirmDone() {
  var t = tasks.find(function(x) { return x.id == _pendingId; });
  closeConfirm();
  if (!t) return;
  t.done = true;
  renderTasks(); updateStats();
  persist(function() { showToast('🎉 משימה הושלמה!', var_green); });
}

function closeConfirm() {
  document.getElementById('confirmModal').classList.remove('on');
  _pendingId = null;
}

// ===== DELETE =====
function deleteTask(id) {
  var t = tasks.find(function(x) { return x.id === id; });
  if (!t || !confirm('למחוק "' + t.title + '"?')) return;
  tasks = tasks.filter(function(x) { return x.id !== id; });
  renderTasks(); updateStats(); refreshLists();
  persist(function() { showToast('🗑️ נמחקה', var_red); });
}

// ===== PERSIST =====
function persist(onDone) {
  localStorage.setItem('tasks_cache', JSON.stringify(tasks));
  if (!isOnline) {
    queueSync('save', null);
    if (onDone) onDone();
    return;
  }
  setSyncStatus('syncing');
  apiCall('saveTasks', { tasks: tasks }, function() {
    setSyncStatus('');
    if (onDone) onDone();
  }, function() {
    setSyncStatus('error');
    queueSync('save', null);
    if (onDone) onDone();
  });
}

// ===== EDIT =====
function openEdit(id) {
  var t = tasks.find(function(x) { return x.id === id; });
  if (!t) return;
  editingId = id;
  document.getElementById('eTitle').value = t.title || '';
  document.getElementById('eDesc').value = t.desc || '';
  document.getElementById('eProj').value = t.project || '';
  document.getElementById('ePri').value = t.priority || 'בינונית';
  document.getElementById('eDate').value = t.deadline || '';
  document.getElementById('eTime').value = t.time || '';
  document.getElementById('eAssign').value = t.assign || '';
  _editTags = (t.tags || []).slice();
  renderTagsDisplay('edit');
  var isRecur = !!t.recurring;
  document.getElementById('eChkRecur').checked = isRecur;
  var rd = document.getElementById('eRecurDays');
  rd.style.display = isRecur ? 'flex' : 'none';
  var days = t.recurDays || [];
  document.querySelectorAll('#eRecurDays .day-btn').forEach(function(b) {
    b.classList.toggle('sel', days.indexOf(parseInt(b.dataset.day)) >= 0);
  });
  document.getElementById('editModal').classList.add('on');
}

function saveEdit() {
  var t = tasks.find(function(x) { return x.id === editingId; });
  if (!t) return;
  t.title = document.getElementById('eTitle').value.trim();
  t.desc = document.getElementById('eDesc').value.trim();
  t.project = document.getElementById('eProj').value.trim();
  t.priority = document.getElementById('ePri').value;
  t.deadline = document.getElementById('eDate').value;
  t.time = document.getElementById('eTime').value || '';
  t.assign = document.getElementById('eAssign').value.trim();
  t.tags = _editTags.slice();
  t.recurring = document.getElementById('eChkRecur').checked;
  t.recurDays = [];
  if (t.recurring) {
    document.querySelectorAll('#eRecurDays .day-btn.sel').forEach(function(b) {
      t.recurDays.push(parseInt(b.dataset.day));
    });
  }
  closeEdit();
  renderTasks(); updateStats(); refreshLists();
  persist(function() { showToast('✅ נשמר'); });
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('on');
  editingId = null;
}

// ===== FILTER =====
var currentTagFilter = '';
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    var bf = b.dataset.f;
    b.classList.toggle('on', bf === f);
    b.classList.remove('on-red');
    if (bf === 'overdue' && bf === f) { b.classList.remove('on'); b.classList.add('on-red'); }
  });
  renderTasks();
}

function getFiltered() {
  var today = new Date().toISOString().split('T')[0];
  var search = (document.getElementById('searchBox').value || '').trim().toLowerCase();
  var projF = document.getElementById('projFilter').value;
  var tagF = document.getElementById('tagFilter').value;
  return tasks.filter(function(t) {
    var ms = !search || (t.title||'').toLowerCase().includes(search) ||
             (t.project||'').toLowerCase().includes(search) ||
             (t.assign||'').toLowerCase().includes(search);
    if (!ms) return false;
    if (projF && t.project !== projF) return false;
    if (tagF && !(t.tags||[]).includes(tagF)) return false;
    if (currentFilter === 'open') return !t.done;
    if (currentFilter === 'done') return t.done;
    if (currentFilter === 'today') return !t.done && t.deadline === today;
    if (currentFilter === 'overdue') return !t.done && t.deadline && t.deadline < today;
    if (currentFilter === 'recur') return t.recurring;
    return true;
  });
}

// ===== RENDER =====
function renderTasks() {
  var el = document.getElementById('tasksList');
  var filtered = getFiltered();
  var open = filtered.filter(function(t) { return !t.done; });
  var done = filtered.filter(function(t) { return t.done; });
  var today = new Date().toISOString().split('T')[0];

  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">אין משימות להצגה</div></div>';
    return;
  }

  var html = '';
  if (open.length) {
    html += '<div class="section-hdr">פתוחות — ' + open.length + '</div>';
    open.forEach(function(t) { html += taskHTML(t, today); });
  }
  if (done.length && (currentFilter === 'all' || currentFilter === 'done')) {
    html += '<hr class="divider">';
    html += '<div class="section-hdr" style="color:var(--green)">הושלמו — ' + done.length + '</div>';
    done.forEach(function(t) { html += taskHTML(t, today); });
  }
  el.innerHTML = html;
}

function taskHTML(t, today) {
  var priClass = t.priority === 'גבוהה' ? 'pri-high' : (t.priority === 'בינונית' ? 'pri-mid' : '');

  var priBadge = '';
  if (t.priority === 'גבוהה') priBadge = '<span class="badge b-high">🔴 דחוף</span>';
  else if (t.priority === 'נמוכה') priBadge = '<span class="badge b-low">🟢 נמוך</span>';

  var dateBadge = '';
  if (t.deadline) {
    var dp = t.deadline.split('-');
    var dateStr = dp[2]+'/'+dp[1];
    if (t.deadline < today) dateBadge = '<span class="badge b-overdue">⚠️ ' + dateStr + '</span>';
    else if (t.deadline === today) dateBadge = '<span class="badge b-today">📅 היום</span>';
    else dateBadge = '<span class="badge b-date">📅 ' + dateStr + '</span>';
  }

  var timeBadge = t.time ? '<span class="badge b-time">🕐 ' + esc(t.time) + '</span>' : '';
  var projBadge = t.project ? '<span class="badge b-proj">📁 ' + esc(t.project) + '</span>' : '';
  var assignBadge = t.assign ? '<span class="badge b-assign">👤 ' + esc(t.assign) + '</span>' : '';

  var recurBadge = '';
  if (t.recurring && t.recurDays && t.recurDays.length) {
    var dn = ['א','ב','ג','ד','ה','ו','ש'];
    recurBadge = '<span class="badge b-recur">🔁 ' + t.recurDays.map(function(d){ return dn[d]; }).join(',') + '</span>';
  }

  var tagsBadge = '';
  if (t.tags && t.tags.length) {
    t.tags.forEach(function(tag, i) {
      var c = TAG_COLORS[i % TAG_COLORS.length];
      tagsBadge += '<span class="badge" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'33">' + esc(tag) + '</span>';
    });
  }

  var offlineBadge = t._pendingSync ? '<span class="badge b-offline">⏳ ממתין לסנכרון</span>' : '';

  return '<div class="task-card ' + priClass + (t.done ? ' done' : '') + '" data-id="' + t.id + '">' +
    '<div class="task-check' + (t.done ? ' checked' : '') + '" onclick="toggleDone(' + t.id + ')">' + (t.done ? '✓' : '') + '</div>' +
    '<div class="task-body">' +
      '<div class="task-title">' + esc(t.title) + '</div>' +
      (t.desc ? '<div class="task-desc">' + esc(t.desc) + '</div>' : '') +
      '<div class="task-meta">' + priBadge + dateBadge + timeBadge + projBadge + recurBadge + assignBadge + tagsBadge + offlineBadge + '</div>' +
    '</div>' +
    '<div class="task-actions">' +
      '<button class="btn-icon btn-cal" title="הוסף ליומן" onclick="addToCal(' + t.id + ')">📅</button>' +
      '<button class="btn-icon" onclick="openEdit(' + t.id + ')">✏️</button>' +
      '<button class="btn-icon btn-del" onclick="deleteTask(' + t.id + ')">🗑️</button>' +
    '</div>' +
  '</div>';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== STATS =====
function updateStats() {
  var today = new Date().toISOString().split('T')[0];
  var open = tasks.filter(function(t) { return !t.done; }).length;
  var overdue = tasks.filter(function(t) { return !t.done && t.deadline && t.deadline < today; }).length;
  var done = tasks.filter(function(t) { return t.done; }).length;
  var html = '<div class="stat-chip stat-open">📋 <b>' + open + '</b></div>';
  if (overdue) html += '<div class="stat-chip stat-overdue">⚠️ <b>' + overdue + '</b></div>';
  html += '<div class="stat-chip stat-done">✅ <b>' + done + '</b></div>';
  document.getElementById('headerStats').innerHTML = html;
}

// ===== LISTS =====
function refreshLists() {
  var projs = {}, tagsSeen = {};
  tasks.forEach(function(t) {
    if (t.project) projs[t.project] = 1;
    (t.tags||[]).forEach(function(tag) { tagsSeen[tag] = 1; });
  });
  var projArr = Object.keys(projs).sort();
  var tagArr = Object.keys(tagsSeen).sort();

  ['projList','projList2'].forEach(function(id) {
    var dl = document.getElementById(id);
    if (!dl) return;
    dl.innerHTML = projArr.map(function(p){ return '<option value="'+esc(p)+'">'; }).join('');
  });

  var ps = document.getElementById('projFilter');
  var cur = ps.value;
  ps.innerHTML = '<option value="">📁 כל הפרויקטים</option>' +
    projArr.map(function(p){ return '<option value="'+esc(p)+'">📁 '+esc(p)+'</option>'; }).join('');
  if (cur) ps.value = cur;

  var ts = document.getElementById('tagFilter');
  var tcur = ts.value;
  ts.innerHTML = '<option value="">🏷️ כל התגיות</option>' +
    tagArr.map(function(t){ return '<option value="'+esc(t)+'">🏷️ '+esc(t)+'</option>'; }).join('');
  if (tcur) ts.value = tcur;
}

// ===== TAGS =====
function handleTag(e, mode) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    var id = mode === 'new' ? 'newTagIn' : 'eTagIn';
    var val = document.getElementById(id).value.trim().replace(/,/g,'');
    if (!val) return;
    var arr = mode === 'new' ? _newTags : _editTags;
    if (!arr.includes(val)) arr.push(val);
    document.getElementById(id).value = '';
    renderTagsDisplay(mode);
    refreshLists();
  }
  if (e.key === 'Backspace' && e.target.value === '') {
    var arr = mode === 'new' ? _newTags : _editTags;
    if (arr.length) { arr.pop(); renderTagsDisplay(mode); }
  }
}

function renderTagsDisplay(mode) {
  var arr = mode === 'new' ? _newTags : _editTags;
  var id = mode === 'new' ? 'newTagsDisplay' : 'eTagsDisplay';
  document.getElementById(id).innerHTML = arr.map(function(tag, i) {
    var c = TAG_COLORS[i % TAG_COLORS.length];
    return '<span class="tag-chip" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'33" onclick="removeTag(\''+mode+'\','+i+')">'
      + esc(tag) + ' <span class="x">✕</span></span>';
  }).join('');
}

function removeTag(mode, idx) {
  if (mode === 'new') _newTags.splice(idx, 1);
  else _editTags.splice(idx, 1);
  renderTagsDisplay(mode);
}

// ===== RECURRING =====
function toggleRecur() {
  var on = document.getElementById('chkRecur').checked;
  document.getElementById('recurDays').style.display = on ? 'flex' : 'none';
  if (!on) document.querySelectorAll('#recurDays .day-btn').forEach(function(b){ b.classList.remove('sel'); });
}
function toggleEditRecur() {
  var on = document.getElementById('eChkRecur').checked;
  var rd = document.getElementById('eRecurDays');
  rd.style.display = on ? 'flex' : 'none';
  if (!on) document.querySelectorAll('#eRecurDays .day-btn').forEach(function(b){ b.classList.remove('sel'); });
}

// ===== REMINDERS =====
function sendReminders() {
  var today = new Date().toISOString().split('T')[0];
  var overdue = tasks.filter(function(t){ return !t.done && t.deadline && t.deadline < today; });
  if (!overdue.length) { showToast('🎉 אין משימות באיחור!', var_green); return; }
  if (!isOnline) { showToast('❌ אין חיבור לאינטרנט', var_red); return; }
  var btn = document.getElementById('btnReminder');
  btn.textContent = '⏳ שולח...';
  btn.disabled = true;
  apiCall('sendReminders', null, function(msg) {
    showToast('✅ ' + (msg || 'נשלחו תזכורות'), var_green);
    btn.textContent = '🔔 תזכורת';
    btn.disabled = false;
  }, function(e) {
    showToast('שגיאה: ' + (e.message||''), var_red);
    btn.textContent = '🔔 תזכורת';
    btn.disabled = false;
  });
}

// ===== CALENDAR ADD =====
function addToCal(id) {
  var t = tasks.find(function(x){ return x.id === id; });
  if (!t) return;
  if (!isOnline) { showToast('❌ נדרש חיבור לאינטרנט', var_red); return; }
  if (!t.deadline && !confirm('אין תאריך יעד. להוסיף להיום?')) return;
  showToast('⏳ מוסיף ליומן...', var_green);
  apiCall('addToCalendar', { task: t }, function(res) {
    if (res && res.link) window.open(res.link, '_blank');
    showToast('✅ נוסף ליומן!', var_green);
  }, function(e) { showToast('שגיאה: ' + (e.message||''), var_red); });
}

// ===== CALENDAR VIEW =====
function setView(v) {
  var isCal = v === 'cal';
  document.getElementById('calWrap').classList.toggle('show', isCal);
  document.getElementById('listWrap').style.display = isCal ? 'none' : '';
  document.getElementById('btnList').classList.toggle('on', !isCal);
  document.getElementById('btnCal').classList.toggle('on', isCal);
  if (isCal) renderCalendar();
}

function renderCalendar() {
  var now = new Date();
  if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth(); }
  var mn = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  document.getElementById('calTitle').textContent = mn[calMonth] + ' ' + calYear;
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['א','ב','ג','ד','ה','ו','ש'].forEach(function(d){
    var el = document.createElement('div'); el.className = 'cal-day-name'; el.textContent = d; grid.appendChild(el);
  });
  var firstDay = new Date(calYear, calMonth, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  var todayStr = now.toISOString().split('T')[0];
  for (var i = 0; i < firstDay; i++) {
    var el = document.createElement('div'); el.className = 'cal-cell other-month'; grid.appendChild(el);
  }
  for (var d = 1; d <= daysInMonth; d++) {
    var ds = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var cell = document.createElement('div');
    cell.className = 'cal-cell' + (ds === todayStr ? ' today' : '');
    var num = document.createElement('div'); num.className = 'cal-cell-num'; num.textContent = d;
    cell.appendChild(num);
    tasks.filter(function(t){ return !t.done && t.deadline === ds; }).slice(0,3).forEach(function(t){
      var dot = document.createElement('div');
      dot.className = 'cal-dot ' + (t.priority === 'גבוהה' ? 'high' : t.priority === 'נמוכה' ? 'low' : 'mid');
      dot.textContent = t.title;
      cell.appendChild(dot);
    });
    (function(dateStr){ cell.addEventListener('click', function(){ openDayModal(dateStr); }); })(ds);
    grid.appendChild(cell);
  }
}

function openDayModal(dateStr) {
  var dayTasks = tasks.filter(function(t){ return t.deadline === dateStr; });
  var dp = dateStr.split('-');
  var dn = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  document.getElementById('dayModalTitle').textContent = 'יום ' + dn[new Date(dateStr).getDay()] + ' — ' + dp[2]+'/'+dp[1];
  if (!dayTasks.length) {
    document.getElementById('dayModalContent').innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px">אין משימות ליום זה</div>';
  } else {
    dayTasks.sort(function(a,b){ return (a.time||'99').localeCompare(b.time||'99'); });
    var html = dayTasks.map(function(t) {
      var pc = t.priority === 'גבוהה' ? 'var(--red)' : t.priority === 'נמוכה' ? 'var(--green)' : 'var(--yellow)';
      return '<div style="padding:12px;border:1px solid var(--border);border-right:3px solid '+pc+';border-radius:8px;margin-bottom:8px'+(t.done?';opacity:.45':'')+'">'+
        '<div style="display:flex;justify-content:space-between"><span style="font-weight:700">'+ esc(t.title)+'</span>'+(t.time?'<span style="color:var(--cyan);font-size:.8rem">🕐 '+t.time+'</span>':'')+'</div>'+
        (t.desc?'<div style="font-size:.76rem;color:var(--text2);margin-top:4px">'+esc(t.desc)+'</div>':'')+
        '</div>';
    }).join('');
    document.getElementById('dayModalContent').innerHTML = html;
  }
  document.getElementById('dayModal').classList.add('on');
}

function calPrev() { if (--calMonth < 0) { calMonth=11; calYear--; } renderCalendar(); }
function calNext() { if (++calMonth > 11) { calMonth=0; calYear++; } renderCalendar(); }

// ===== TOAST =====
function showToast(msg, color) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = color || 'var(--accent)';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.remove('show'); }, 2800);
}

// ===== KEYBOARD =====
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('newTitle').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTask();
  });
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEdit();
  });
  document.getElementById('confirmModal').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
  });
  document.getElementById('dayModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('on');
  });

  // Load pending sync
  var ps = localStorage.getItem('pending_sync');
  if (ps) try { pendingSync = JSON.parse(ps); } catch(e) {}

  init();
});
</script>
