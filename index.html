<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="משימות">
<title>מנהל משימות</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1525;
  --surface: #141a2e;
  --surface2: #1a2340;
  --surface3: #202b4d;
  --border: #2a3555;
  --border2: #364265;
  --text: #e8eef8;
  --text2: #8896b3;
  --text3: #5a6a8a;
  --accent: #4f8ef7;
  --accent2: #7b5cf0;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --purple: #a78bfa;
  --orange: #fb923c;
  --cyan: #22d3ee;
  --r: 12px;
  --r2: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
  --shadow2: 0 2px 12px rgba(0,0,0,.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overscroll-behavior: none;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* HEADER */
.header {
  background: #ffffff;
  border-bottom: 1px solid #e0e0e0;
  padding: 0 20px;
  height: 76px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 1.15rem;
  font-weight: 900;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-right { display: flex; align-items: center; gap: 8px; }

.header-stats { display: flex; gap: 6px; align-items: center; }

.stat-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: .72rem;
  font-weight: 700;
  border: 1px solid;
}
.stat-open { background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.3); color: var(--green); }
.stat-overdue { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); color: var(--red); }
.stat-done { background: rgba(79,142,247,.1); border-color: rgba(79,142,247,.3); color: var(--accent); }

.btn-reminder {
  background: rgba(251,191,36,.1);
  border: 1px solid rgba(251,191,36,.3);
  color: var(--yellow);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: 'Heebo', sans-serif;
  font-size: .75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.btn-reminder:hover { background: rgba(251,191,36,.2); }
.btn-reminder:disabled { opacity: .5; }

/* OFFLINE BANNER */
.offline-banner {
  display: none;
  background: rgba(251,191,36,.15);
  border-bottom: 1px solid rgba(251,191,36,.3);
  color: var(--yellow);
  font-size: .78rem;
  font-weight: 600;
  padding: 8px 20px;
  text-align: center;
}
.offline-banner.show { display: block; }

/* SYNC INDICATOR */
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  transition: background .3s;
}
.sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* CONTAINER */
.container { max-width: 860px; margin: 0 auto; padding: 20px 16px 100px; }

/* VIEW TOGGLE */
.view-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 5px;
}
.view-btn {
  flex: 1;
  padding: 7px 12px;
  border-radius: 8px;
  border: none;
  background: none;
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.view-btn.on { background: var(--surface2); color: var(--text); box-shadow: var(--shadow2); }

/* ADD TASK CARD */
.add-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 20px;
  transition: border-color .2s;
}
.add-card:focus-within { border-color: var(--accent); }

.add-card-title {
  font-size: .72rem;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.form-full { grid-column: 1 / -1; }

.input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: .86rem;
  padding: 9px 12px;
  outline: none;
  width: 100%;
  transition: border-color .2s;
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text3); }
select.input option { background: #1a2340; }
textarea.input { resize: vertical; min-height: 56px; }

.form-row-inline { display: flex; gap: 8px; margin-bottom: 8px; }
.form-row-inline .input { flex: 1; }

/* TAGS INPUT */
.tags-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 6px 10px;
  cursor: text;
  transition: border-color .2s;
  min-height: 40px;
}
.tags-wrap:focus-within { border-color: var(--accent); }
.tags-input { background: none; border: none; color: var(--text); font-family: 'Heebo', sans-serif; font-size: .84rem; outline: none; min-width: 100px; flex: 1; }
.tag-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: .68rem;
  font-weight: 700;
  cursor: pointer;
}
.tag-chip .x { opacity: .6; font-size: .65rem; }

/* RECURRING */
.recur-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.recur-label { font-size: .8rem; color: var(--text2); display: flex; align-items: center; gap: 6px; cursor: pointer; }
.recur-label input[type=checkbox] { accent-color: var(--purple); width: 15px; height: 15px; }
.days-grid { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.day-btn {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: .74rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.day-btn.sel { background: rgba(167,139,250,.2); border-color: var(--purple); color: var(--purple); }

/* RECURRING TYPE TOGGLE */
.recur-type-row { display: flex; gap: 6px; margin-top: 8px; }
.recur-type-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: .78rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
}
.recur-type-btn.on { background: rgba(167,139,250,.2); border-color: var(--purple); color: var(--purple); }

/* MONTH DAYS GRID */
.month-days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.month-day-btn {
  padding: 5px 2px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: .72rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
}
.month-day-btn.sel { background: rgba(34,211,238,.15); border-color: var(--cyan); color: var(--cyan); }
.month-day-btn:hover { border-color: var(--border2); }

.add-btn-row { display: flex; justify-content: flex-start; }
.btn-add {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: var(--r2);
  color: white;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: .86rem;
  font-weight: 700;
  padding: 9px 22px;
  transition: opacity .2s, transform .1s;
}
.btn-add:hover { opacity: .9; transform: translateY(-1px); }
.btn-add:disabled { opacity: .4; }

/* FILTERS */
.filters-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 14px;
}
.filter-btn {
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.filter-btn.on { background: var(--accent); border-color: var(--accent); color: white; }
.filter-btn.on-red { background: var(--red); border-color: var(--red); color: white; }

.search-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: .8rem;
  padding: 5px 13px;
  outline: none;
  flex: 1;
  min-width: 140px;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent); }

select.filter-sel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: .78rem;
  padding: 5px 13px;
  outline: none;
  cursor: pointer;
}

/* SECTION HEADER */
.section-hdr {
  font-size: .7rem;
  font-weight: 800;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 0 4px;
  margin-bottom: 8px;
  margin-top: 4px;
}

/* TASK CARD */
.task-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 13px 15px;
  margin-bottom: 8px;
  display: flex;
  gap: 11px;
  align-items: flex-start;
  transition: border-color .2s, transform .15s, opacity .3s, background .2s;
  position: relative;
  overflow: hidden;
}
.task-card::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 0 12px 12px 0;
}
.task-card:hover { transform: translateX(-2px); }
.task-card.pri-high {
  background: rgba(248,113,113,.10);
  border-color: #f87171;
}
.task-card.pri-high::after { background: #f87171; }
.task-card.pri-high:hover { background: rgba(248,113,113,.16); }
.task-card.pri-mid {
  background: rgba(251,191,36,.06);
  border-color: rgba(251,191,36,.5);
}
.task-card.pri-mid::after { background: var(--yellow); }
.task-card.pri-mid:hover { background: rgba(251,191,36,.1); }
/* Per-card color accent via data-color */
.task-card[data-color="blue"]   { border-color: rgba(79,142,247,.6); }
.task-card[data-color="blue"]::after { background: var(--accent); }
.task-card[data-color="purple"] { border-color: rgba(167,139,250,.6); }
.task-card[data-color="purple"]::after { background: var(--purple); }
.task-card[data-color="cyan"]   { border-color: rgba(34,211,238,.5); }
.task-card[data-color="cyan"]::after { background: var(--cyan); }
.task-card[data-color="green"]  { border-color: rgba(52,211,153,.5); }
.task-card[data-color="green"]::after { background: var(--green); }
.task-card[data-color="orange"] { border-color: rgba(251,146,60,.5); }
.task-card[data-color="orange"]::after { background: var(--orange); }
.task-card.done { opacity: .4; }
.task-card.done .task-title { text-decoration: line-through; color: var(--text2); }

.task-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .75rem;
  color: transparent;
  font-weight: 900;
}
.task-check:hover { border-color: var(--green); background: rgba(52,211,153,.1); }
.task-check.checked { background: var(--green); border-color: var(--green); color: #0a0e1a; }

.task-body { flex: 1; min-width: 0; }
.task-title { font-size: .9rem; font-weight: 600; margin-bottom: 3px; }
.task-desc { font-size: .78rem; color: var(--text2); margin-bottom: 6px; line-height: 1.5; }
.task-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: .68rem;
  font-weight: 700;
  white-space: nowrap;
}
.b-high { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
.b-low  { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
.b-date { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.b-overdue { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
.b-today { background: rgba(251,191,36,.12); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
.b-proj { background: rgba(79,142,247,.1); color: var(--accent); border: 1px solid rgba(79,142,247,.2); }
.b-assign { background: rgba(167,139,250,.1); color: var(--purple); border: 1px solid rgba(167,139,250,.2); }
.b-recur { background: rgba(167,139,250,.12); color: var(--purple); border: 1px solid rgba(167,139,250,.2); }
.b-time { background: rgba(34,211,238,.1); color: var(--cyan); border: 1px solid rgba(34,211,238,.2); }
.b-offline { background: rgba(251,191,36,.1); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }

/* TASK DATES ROW */
.task-dates {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 7px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
  font-size: .68rem;
  color: var(--text3);
  font-weight: 500;
}
.task-dates span { display: flex; align-items: center; gap: 3px; }
.task-dates-sep { color: var(--border2) !important; font-size: .8rem; }
.task-card.pri-high .task-dates { border-top-color: rgba(248,113,113,.25); }
.task-card.pri-mid .task-dates { border-top-color: rgba(251,191,36,.2); }

.task-actions {
  display: flex;
  gap: 4px;
  align-items: flex-start;
  flex-shrink: 0;
}
.btn-icon {
  background: none;
  border: 1px solid transparent;
  border-radius: 7px;
  color: var(--text3);
  cursor: pointer;
  font-size: .78rem;
  padding: 4px 7px;
  transition: all .2s;
  line-height: 1;
}
.btn-icon:hover { border-color: var(--border); color: var(--text2); background: var(--surface2); }
.btn-del:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,.08); }
.btn-cal:hover { border-color: var(--green); color: var(--green); background: rgba(52,211,153,.08); }

/* SUMMARY BOXES */
.summary-section { margin-bottom: 20px; }
.summary-section-title {
  font-size: .72rem;
  font-weight: 800;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 10px;
  padding: 0 4px;
}
.summary-boxes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.summary-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  min-width: 0;
}
.summary-box.summary-week  { border-color: rgba(79,142,247,.4); }
.summary-box.summary-month { border-color: rgba(167,139,250,.4); }
.summary-box-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: .75rem;
  font-weight: 800;
  margin-bottom: 8px;
  color: var(--text2);
}
.summary-week  .summary-box-hdr { color: var(--accent); }
.summary-month .summary-box-hdr { color: var(--purple); }
.summary-count {
  background: var(--surface2);
  border-radius: 20px;
  padding: 1px 8px;
  font-size: .68rem;
  font-weight: 700;
  color: var(--text3);
}

/* WEEK GROUPS */
.weeks-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
  align-items: start;
}
@media (max-width: 700px) { .weeks-grid { grid-template-columns: 1fr; } }
.week-group { margin-bottom: 0; }
.week-group-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 8px;
  border-right: 3px solid var(--border2);
}
.week-group-hdr.this-week { border-right-color: var(--accent); background: rgba(79,142,247,.08); }
.week-group-label { font-size: .75rem; font-weight: 800; color: var(--text2); }
.week-group-hdr.this-week .week-group-label { color: var(--accent); }
.week-group-count { font-size: .68rem; color: var(--text3); font-weight: 600; }

@media (max-width: 600px) {
  .summary-boxes { grid-template-columns: 1fr; }
}

/* EMPTY */
.empty { text-align: center; padding: 56px 20px; color: var(--text3); }
.empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .5; }
.empty-text { font-size: .9rem; }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

/* CALENDAR */
.cal-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  display: none;
}
.cal-wrap.show { display: block; }
.cal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.cal-hdr h3 { font-size: .95rem; font-weight: 700; }
.cal-nav {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  padding: 5px 12px;
  font-size: .9rem;
  transition: all .2s;
}
.cal-nav:hover { border-color: var(--accent); }
.cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 2px; width: 100%; }
.cal-day-name { font-size: .62rem; color: var(--text3); text-align: center; padding: 4px 1px; font-weight: 700; overflow: hidden; }
.cal-cell {
  min-height: 52px;
  border-radius: 5px;
  padding: 3px 2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .2s;
  overflow: hidden;
  min-width: 0;
}
.cal-cell:hover { border-color: var(--accent); }
.cal-cell.today { border-color: var(--accent); background: rgba(79,142,247,.08); }
.cal-cell.other-month { opacity: .25; }
.cal-cell-num { font-size: .65rem; color: var(--text2); margin-bottom: 2px; }
.cal-cell.today .cal-cell-num { color: var(--accent); font-weight: 800; }
.cal-dot {
  font-size: .52rem;
  border-radius: 3px;
  padding: 1px 2px;
  margin-bottom: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
  max-width: 100%;
}
.cal-dot.high { background: rgba(248,113,113,.25); color: #ff9090; }
.cal-dot.mid  { background: rgba(251,191,36,.2); color: var(--yellow); }
.cal-dot.low  { background: rgba(52,211,153,.15); color: var(--green); }
.cal-dot.cal-event { background: rgba(130,80,220,.2); color: #b794f4; }

/* MODAL */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);

}

}
@keyframes modalIn { from { opacity:0; transform:scale(.95) translateY(10px); } to { opacity:1; transform:none; } }
.modal h3 { font-size: .95rem; font-weight: 700; margin-bottom: 16px; }
.modal label { font-size: .75rem; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 10px; }

.modal-btns button {

  font-size: .86rem;
  font-weight: 700;
  padding: 10px;

}
.modal-btns button:hover { opacity: .9; }
.btn-save { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
.btn-cancel { background: var(--surface2); color: var(--text2); border: 1px solid var(--border) !important; }

/* CONFIRM MODAL */

.confirm-title { font-size: 1rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
.confirm-sub { font-size: .82rem; color: var(--text2); text-align: center; margin-bottom: 4px; }

/* TOAST */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border2);

  font-weight: 600;

  z-index: 999;

}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* INSTALL BANNER */
#installBanner {

    גישה מהירה ממסך הבית
  </div>
  <button class="btn-install" onclick="installApp()">התקן</button>
  <button class="btn-dismiss" onclick="dismissInstall()">✕</button>
</div>

<script>
// ===== STATE =====
var tasks = [];
var currentFilter = 'all';
var editingId = null;
var _newTags = [], _editTags = [];
var _pendingId = null;
var calYear, calMonth;
var isOnline = navigator.onLine;
var pendingSync = [];
var deferredPrompt = null;

var TAG_COLORS = ['#f97316','#06b6d4','#8b5cf6','#ec4899','#10b981','#f59e0b','#3b82f6','#ef4444'];
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJlvGFet8qtyFo4pvv2cB2x4zzhBMV8YNNsDsQE4o8hdZe7eVT12YvEWr2FHuxhJ4axw/exec'; // ← החלף בכתובת ה-Web App שלך

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(function(reg) { console.log('SW registered'); })
    .catch(function(e) { console.log('SW failed:', e); });
}

// ===== ONLINE/OFFLINE =====
window.addEventListener('online', function() {
  isOnline = true;
  document.getElementById('offlineBanner').classList.remove('show');
  setSyncStatus('syncing');
  syncPending();
});
window.addEventListener('offline', function() {
  isOnline = false;
  document.getElementById('offlineBanner').classList.add('show');
  setSyncStatus('error');
});

function setSyncStatus(s) {
  var dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (s ? ' ' + s : '');
}

// ===== PWA INSTALL =====
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('installDismissed')) {
    setTimeout(function() {
      document.getElementById('installBanner').classList.add('show');
    }, 3000);
  }
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r) {
    deferredPrompt = null;
    dismissInstall();
  });
}
function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('installDismissed', '1');
}

// ===== INIT =====
function init() {
  setTimeout(function() {
    var s = document.getElementById('splashScreen');
    if (s) { s.style.opacity='0'; setTimeout(function(){ s.style.display='none'; },500); }
  }, 1400);

  document.getElementById('newDeadline').value = new Date().toISOString().split('T')[0];

  // Day buttons click
  document.querySelectorAll('.day-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { this.classList.toggle('sel'); });
  });

  // Load from local cache first (instant display)
  var cached = localStorage.getItem('tasks_cache');
  if (cached) {
    try { tasks = JSON.parse(cached); renderTasks(); updateStats(); refreshLists(); } catch(e) {}
  }

  if (!navigator.onLine) {
    document.getElementById('offlineBanner').classList.add('show');
    setSyncStatus('error');
    return;
  }

  loadTasks();
}

// ===== LOAD =====
function loadTasks() {
  setSyncStatus('syncing');
  apiCall('getTasks', null, function(data) {
    tasks = data || [];
    localStorage.setItem('tasks_cache', JSON.stringify(tasks));
    renderTasks();
    updateStats();
    refreshLists();
    setSyncStatus('');
  }, function(e) {
    setSyncStatus('error');
    showToast('שגיאה בטעינה — מציג מטמון', var_red);
  });
}

// ===== API CALL =====
function apiCall(action, payload, onSuccess, onError) {
  // GET for reads, POST via form-encoded for writes (avoids CORS preflight)
  var url = APPS_SCRIPT_URL;
  if (!payload) {
    // Simple GET
    var extraParams = '';
    for (var i = 4; i < arguments.length; i++) {
      if (arguments[i] !== undefined) extraParams += '&param' + (i-3) + '=' + arguments[i];
    }
    fetch(url + '?action=' + action + extraParams)
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) { if (onError) onError({message: d.error}); }
        else { if (onSuccess) onSuccess(d.data !== undefined ? d.data : d); }
      })
      .catch(function(e) { if (onError) onError(e); });
  } else {
    // POST with text/plain to avoid CORS preflight
    var body = JSON.stringify({action: action, payload: payload});
    fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: body
    })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) { if (onError) onError({message: d.error}); }
        else { if (onSuccess) onSuccess(d.data !== undefined ? d.data : d); }
      })
      .catch(function(e) { if (onError) onError(e); });
  }
}

var var_red = '#f87171';
var var_green = '#34d399';

// ===== OFFLINE QUEUE =====
function queueSync(type, data) {
  pendingSync.push({ type: type, data: data, ts: Date.now() });
  localStorage.setItem('pending_sync', JSON.stringify(pendingSync));
}

function syncPending() {
  if (!pendingSync.length) { setSyncStatus(''); return; }
  // Re-save all tasks (simplest strategy)
  apiCall('saveTasks', { tasks: tasks }, function() {
    pendingSync = [];
    localStorage.removeItem('pending_sync');
    setSyncStatus('');
    showToast('✅ סונכרן בהצלחה', var_green);
  }, function() {
    setSyncStatus('error');
  });
}

// ===== ADD TASK =====
function addTask() {
  var title = document.getElementById('newTitle').value.trim();
  if (!title) { showToast('נא להזין כותרת', var_red); return; }

  var isRecur = document.getElementById('chkRecur').checked;
  var recurDays = [];
  var recurMonthDays = [];
  var recurType = _newRecurType;
  if (isRecur) {
    if (recurType === 'weekly') {
      document.querySelectorAll('#recurDays .day-btn.sel').forEach(function(b) {
        recurDays.push(parseInt(b.dataset.day));
      });
      if (!recurDays.length) { showToast('בחר לפחות יום אחד', var_red); return; }
    } else {
      document.querySelectorAll('#newMonthDaysGrid .month-day-btn.sel').forEach(function(b) {
        recurMonthDays.push(parseInt(b.dataset.md));
      });
      if (!recurMonthDays.length) { showToast('בחר לפחות תאריך אחד בחודש', var_red); return; }
    }
  }

  var task = {
    id: Date.now(),
    title: title,
    desc: document.getElementById('newDesc').value.trim(),
    project: document.getElementById('newProject').value.trim(),
    priority: document.getElementById('newPriority').value,
    deadline: document.getElementById('newDeadline').value,
    time: document.getElementById('newTime').value || '',
    assign: document.getElementById('newAssign').value.trim(),
    tags: _newTags.slice(),
    done: false,
    recurring: isRecur,
    recurType: recurType,
    recurDays: recurDays,
    recurMonthDays: recurMonthDays,
    createdAt: new Date().toISOString(),
    _pendingSync: !isOnline
  };

  tasks.unshift(task);
  localStorage.setItem('tasks_cache', JSON.stringify(tasks));
  renderTasks(); updateStats(); refreshLists();
  resetAddForm();

  if (!isOnline) {
    queueSync('add', task);
    showToast('💾 נשמר לוקאלית — יסונכרן כשיחזור חיבור', var_red);
    return;
  }

  setSyncStatus('syncing');
  apiCall('saveTask', { task: task }, function() {
    task._pendingSync = false;
    localStorage.setItem('tasks_cache', JSON.stringify(tasks));
    setSyncStatus('');
    showToast('✅ משימה נוספה!', var_green);
  }, function(e) {
    setSyncStatus('error');
    queueSync('add', task);
    showToast('⚠️ נשמר לוקאלית', var_red);
  });
}

function resetAddForm() {
  ['newTitle','newDesc','newProject','newAssign','newTime'].forEach(function(id) {
    document.getElementById(id).value = '';
  });

// ===== TOGGLE DONE =====
function toggleDone(id) {
  var t = tasks.find(function(x) { return x.id == id; });
  if (!t) return;
  if (t.done) {
    t.done = false;
    persist(function() { showToast('📂 משימה נפתחה מחדש'); });
    renderTasks(); updateStats();
    return;
  }
  _pendingId = t.id;
  document.getElementById('confirmTitle').textContent = t.title;
  document.getElementById('confirmModal').classList.add('on');
}

function confirmDone() {
  var t = tasks.find(function(x) { return x.id == _pendingId; });
  closeConfirm();
  if (!t) return;
  t.done = true;
  renderTasks(); updateStats();
  persist(function() { showToast('🎉 משימה הושלמה!', var_green); });
}

function closeConfirm() {
  document.getElementById('confirmModal').classList.remove('on');
  _pendingId = null;
}

// ===== DELETE =====
function deleteTask(id) {
  var t = tasks.find(function(x) { return x.id === id; });
  if (!t || !confirm('למחוק "' + t.title + '"?')) return;
  tasks = tasks.filter(function(x) { return x.id !== id; });
  renderTasks(); updateStats(); refreshLists();
  persist(function() { showToast('🗑️ נמחקה', var_red); });
}

// ===== PERSIST =====
function persist(onDone) {
  localStorage.setItem('tasks_cache', JSON.stringify(tasks));
  if (!isOnline) {
    queueSync('save', null);
    if (onDone) onDone();
    return;
  }
  setSyncStatus('syncing');
  apiCall('saveTasks', { tasks: tasks }, function() {
    setSyncStatus('');
    if (onDone) onDone();
  }, function() {
    setSyncStatus('error');
    queueSync('save', null);
    if (onDone) onDone();
  });
}

// ===== FILTER =====
var currentTagFilter = '';
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    var bf = b.dataset.f;
    b.classList.toggle('on', bf === f);

  });

function getFiltered() {
  var today = new Date().toISOString().split('T')[0];
  var search = (document.getElementById('searchBox').value || '').trim().toLowerCase();
  var projF = document.getElementById('projFilter').value;
  var tagF = document.getElementById('tagFilter').value;
  return tasks.filter(function(t) {
    var ms = !search || (t.title||'').toLowerCase().includes(search) ||
             (t.project||'').toLowerCase().includes(search) ||
             (t.assign||'').toLowerCase().includes(search);
    if (!ms) return false;
    if (projF && t.project !== projF) return false;
    if (tagF && !(t.tags||[]).includes(tagF)) return false;
    if (currentFilter === 'open') return !t.done;
    if (currentFilter === 'done') return t.done;
    if (currentFilter === 'today') return !t.done && t.deadline === today;
    if (currentFilter === 'overdue') return !t.done && t.deadline && t.deadline > '1900-01-01' && t.deadline < today;
    if (currentFilter === 'recur') return t.recurring;
    return true;
  });
}

// ===== NORMALIZE DATE to yyyy-MM-dd =====
function normalizeDate(dl) {
  if (!dl) return '';
  var s = String(dl).trim();
  // Reject Google Sheets epoch garbage (1899-12-30)
  if (s.startsWith('1899') || s.startsWith('1900-01-00')) return '';
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    var r = s.substring(0,10);
    return r < '1901-01-01' ? '' : r; // reject any pre-1901 date
  }
  if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)) {
    var p = s.split('/');
    return p[2] + '-' + p[1].padStart(2,'0') + '-' + p[0].padStart(2,'0');
  }
  try { var d = new Date(s); if (!isNaN(d.getTime())) { var r2 = d.toISOString().substring(0,10); return r2 < '1901-01-01' ? '' : r2; } } catch(e){}
  return '';
}

// Color palette for cards (cycles by index)
var CARD_COLORS = ['blue','purple','cyan','green','orange','blue','purple','cyan','green','orange'];

// ===== SORT TASKS =====
function sortTasks(arr) {
  return arr.slice().sort(function(a, b) {
    var aDeadline = normalizeDate(a.deadline);
    var bDeadline = normalizeDate(b.deadline);
    var aHasDate = aDeadline && aDeadline > '1900-01-01';
    var bHasDate = bDeadline && bDeadline > '1900-01-01';

    // Tasks with deadline come before tasks without
    if (aHasDate && !bHasDate) return -1;
    if (!aHasDate && bHasDate) return 1;

    // Both have deadline — sort by date
    if (aHasDate && bHasDate && aDeadline !== bDeadline)
      return aDeadline.localeCompare(bDeadline);

    // Same date — sort by time
    var aTime = a.time || '', bTime = b.time || '';
    if (aTime && !bTime) return -1;
    if (!aTime && bTime) return 1;
    if (aTime && bTime && aTime !== bTime) return aTime.localeCompare(bTime);

    // Same date+time — newest creation first
    var aCreated = a.createdAt || '', bCreated = b.createdAt || '';
    return bCreated.localeCompare(aCreated);
  });
}

// ===== TIME GROUP HELPERS =====
function getWeekStart(date) {
  var d = new Date(date);
  d.setDate(d.getDate() - d.getDay()); // Sunday
  return d.toISOString().split('T')[0];
}
function addDays(dateStr, n) {
  var d = new Date(dateStr); d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function formatWeekLabel(weekStart, todayWeekStart) {
  if (weekStart === todayWeekStart) return 'השבוע';
  if (weekStart === addDays(todayWeekStart, -7)) return 'שבוע שעבר';
  if (weekStart === addDays(todayWeekStart, -14)) return 'לפני שבועיים';
  if (weekStart === addDays(todayWeekStart, -21)) return 'לפני 3 שבועות';
  // older — show month
  var d = new Date(weekStart);
  var months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return months[d.getMonth()] + ' ' + d.getFullYear();
}

// ===== SUMMARY BOXES =====
function renderSummaryBoxes(open, today) {
  var MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  var nowD = new Date(today);
  var thisYear = nowD.getFullYear();
  var todayWeekStart = getWeekStart(today);
  var nextWeekStart  = addDays(todayWeekStart, 7);
  var nextWeekEnd    = addDays(todayWeekStart, 13);

  // Next week tasks
  var nextWeekTasks = open.filter(function(t){
    var nd = normalizeDate(t.deadline);
    return nd >= nextWeekStart && nd <= nextWeekEnd;
  });

  // All months of current year from this month onward (excluding current month)
  var monthGroups = [];
  for (var m = nowD.getMonth() + 1; m < 12; m++) {
    var mStart = new Date(thisYear, m, 1).toISOString().split('T')[0];
    var mEnd   = new Date(thisYear, m+1, 0).toISOString().split('T')[0];
    var mTasks = open.filter(function(t){
      var nd = normalizeDate(t.deadline);
      return nd >= mStart && nd <= mEnd;
    });
    // Also include recurring tasks that have no deadline (will recur this month)
    var recurTasks = open.filter(function(t){
      if (!t.recurring || normalizeDate(t.deadline)) return false;
      if (t.recurType === 'monthly' && t.recurMonthDays && t.recurMonthDays.length) return true;
      return false;
    });
    var allTasks = mTasks.concat(recurTasks.filter(function(rt){
      return !mTasks.find(function(mt){ return mt.id === rt.id; });
    }));
    if (allTasks.length) monthGroups.push({ name: MONTHS[m] + ' ' + thisYear, tasks: allTasks });
  }

  var hasAnything = nextWeekTasks.length || monthGroups.length;
  if (!hasAnything) return '';

  function miniCard(t) {
    var nd = normalizeDate(t.deadline);
    var dp = nd && nd > '1900-01-01' ? nd.split('-') : null;
    var dateStr = dp ? dp[2]+'/'+dp[1] : (t.recurring ? '🔁' : '');
    var priColor = t.priority==='גבוהה' ? '#f87171' : t.priority==='נמוכה' ? '#34d399' : '#fbbf24';
    return '<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--surface3);border-radius:7px;margin-bottom:4px">' +
      '<div style="width:6px;height:6px;border-radius:50%;background:'+priColor+';flex-shrink:0"></div>' +
      '<span style="font-size:.75rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</span>' +
      '<span style="font-size:.68rem;color:var(--text3);flex-shrink:0">'+dateStr+'</span>' +
    '</div>';
  }

  var html = '<div class="summary-section">';
  html += '<div class="summary-section-title">📊 תצפית קדימה — ' + thisYear + '</div>';
  html += '<div class="summary-boxes">';

  if (nextWeekTasks.length) {
    html += '<div class="summary-box summary-week">' +
      '<div class="summary-box-hdr">📅 שבוע הבא <span class="summary-count">'+nextWeekTasks.length+'</span></div>' +
      nextWeekTasks.map(miniCard).join('') +
    '</div>';
  }

  monthGroups.forEach(function(mg) {
    html += '<div class="summary-box summary-month">' +
      '<div class="summary-box-hdr">🗓️ '+mg.name+' <span class="summary-count">'+mg.tasks.length+'</span></div>' +
      mg.tasks.map(miniCard).join('') +
    '</div>';
  });

  html += '</div>'; // summary-boxes
  html += '</div>'; // summary-section
  return html;
}

// ===== RENDER =====
function renderTasks() {
  var el = document.getElementById('tasksList');
  var filtered = getFiltered();
  var today = new Date().toISOString().split('T')[0];
  var todayWeekStart  = getWeekStart(today);
  var lastWeekStart   = addDays(todayWeekStart, -7);
  var thisMonthStart  = today.substring(0,7) + '-01';

  var allOpen = sortTasksByCreated(filtered.filter(function(t) { return !t.done; }));
  var done    = sortTasks(filtered.filter(function(t) { return t.done; }));

  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">אין משימות להצגה</div></div>';
    return;
  }

  // ── Split: this week + last week visible, everything older → archive ──
  var thisWeekTasks = [], lastWeekTasks = [], archiveTasks = [];
  allOpen.forEach(function(t) {
    var created = (t.createdAt || today).substring(0,10);
    var ws = getWeekStart(created);
    if (ws === todayWeekStart)      thisWeekTasks.push(t);
    else if (ws === lastWeekStart)  lastWeekTasks.push(t);
    else                            archiveTasks.push(t);
  });

  // Also: any open task whose deadline passed more than a month ago → archive
  // (move overdue-old from thisWeek/lastWeek to archive if needed — keep simple)

  var html = '';

  // ── Tatzpit Kadima (summary forward) ──
  if (currentFilter === 'all' || currentFilter === 'open') {
    html += renderSummaryBoxes(allOpen, today);
  }

  // ── Tatzpit Achora (archive — tasks older than last week) ──
  if (archiveTasks.length && (currentFilter === 'all' || currentFilter === 'open')) {
    html += renderArchiveBoxes(archiveTasks, today);
  }

  // ── This week + Last week side by side ──
  if (thisWeekTasks.length || lastWeekTasks.length) {
    html += '<div class="weeks-grid">';

    if (thisWeekTasks.length) {
      html += '<div class="week-group">' +
        '<div class="week-group-hdr this-week">' +
          '<span class="week-group-label">השבוע</span>' +
          '<span class="week-group-count">' + thisWeekTasks.length + '</span>' +
        '</div>';
      thisWeekTasks.forEach(function(t) { html += taskHTML(t, today); });
      html += '</div>';
    }

    if (lastWeekTasks.length) {
      html += '<div class="week-group">' +
        '<div class="week-group-hdr">' +
          '<span class="week-group-label">שבוע שעבר</span>' +
          '<span class="week-group-count">' + lastWeekTasks.length + '</span>' +
        '</div>';
      lastWeekTasks.forEach(function(t) { html += taskHTML(t, today); });
      html += '</div>';
    }

    html += '</div>';
  }

  // ── Done tasks ──
  if (done.length && (currentFilter === 'all' || currentFilter === 'done')) {
    html += '<hr class="divider">';
    html += '<div class="section-hdr" style="color:var(--green)">✅ הושלמו — ' + done.length + '</div>';
    done.forEach(function(t) { html += taskHTML(t, today); });
  }

  el.innerHTML = html;
}

// ===== ARCHIVE BOXES (backward — older tasks by month) =====
function renderArchiveBoxes(archiveTasks, today) {
  if (!archiveTasks.length) return '';
  var MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

  // Group by month of createdAt
  var monthMap = {}, monthKeys = [];
  archiveTasks.forEach(function(t) {
    var created = (t.createdAt || today).substring(0,7); // yyyy-MM
    if (!monthMap[created]) { monthMap[created] = []; monthKeys.push(created); }
    monthMap[created].push(t);
  });
  monthKeys.sort(function(a,b){ return b.localeCompare(a); }); // newest first

  function miniCard(t) {
    var nd = normalizeDate(t.deadline);
    var dp = nd && nd > '1901-01-01' ? nd.split('-') : null;
    var dateStr = dp ? dp[2]+'/'+dp[1] : (t.recurring ? '🔁' : '');
    var priColor = t.priority==='גבוהה' ? '#f87171' : t.priority==='נמוכה' ? '#34d399' : '#fbbf24';
    return '<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--surface3);border-radius:7px;margin-bottom:4px">' +
      '<div style="width:6px;height:6px;border-radius:50%;background:'+priColor+';flex-shrink:0"></div>' +
      '<span style="font-size:.75rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</span>' +
      '<span style="font-size:.68rem;color:var(--text3);flex-shrink:0">'+dateStr+'</span>' +
    '</div>';
  }

  var html = '<div class="summary-section">';
  html += '<div class="summary-section-title">📂 תצפית אחורה</div>';
  html += '<div class="summary-boxes">';

  monthKeys.forEach(function(ym) {
    var d = new Date(ym + '-01');
    var label = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
    var mTasks = monthMap[ym];
    html += '<div class="summary-box" style="border-color:rgba(88,101,129,.5)">' +
      '<div class="summary-box-hdr" style="color:var(--text2)">📂 '+label+' <span class="summary-count">'+mTasks.length+'</span></div>' +
      mTasks.map(miniCard).join('') +
    '</div>';
  });

  html += '</div></div>';
  return html;
}

// Sort by createdAt ascending (oldest first = appears at top of week group)
function sortTasksByCreated(arr) {
  return arr.slice().sort(function(a,b){
    var ac = a.createdAt||'', bc = b.createdAt||'';
    return ac.localeCompare(bc);
  });
}

// index to color assignment (stable per task id)
function cardColor(t) {
  if (t.priority === 'גבוהה') return '';  // red handled by pri-high class
  if (t.priority === 'בינונית') return ''; // yellow handled by pri-mid class
  var colors = ['blue','purple','cyan','green','orange'];
  var idx = Math.abs(parseInt(String(t.id).slice(-3)) || 0) % colors.length;
  return colors[idx];
}

function taskHTML(t, today) {
  var priClass = t.priority === 'גבוהה' ? 'pri-high' : (t.priority === 'בינונית' ? 'pri-mid' : '');
  var color = cardColor(t);

  var priBadge = '';
  if (t.priority === 'גבוהה') priBadge = '<span class="badge" style="background:rgba(248,113,113,.25);color:#ff8080;border:1.5px solid rgba(248,113,113,.7);font-weight:800;font-size:.75rem">🚨 דחוף</span>';
  else if (t.priority === 'נמוכה') priBadge = '<span class="badge b-low">🟢 נמוך</span>';

  // Use normalizeDate for reliable comparison
  var nd = normalizeDate(t.deadline);
  var dateBadge = '';
  if (nd && nd > '1900-01-01') {
    var dp = nd.split('-');
    var dateStr = dp[2]+'/'+dp[1]+'/'+dp[0];
    if (nd < today) dateBadge = '<span class="badge b-overdue" style="font-size:.75rem;padding:3px 9px">⚠️ באיחור: ' + dateStr + '</span>';
    else if (nd === today) dateBadge = '<span class="badge b-today" style="font-size:.75rem;padding:3px 9px">📅 היום: ' + dateStr + '</span>';
    else dateBadge = '<span class="badge b-date" style="font-size:.75rem;padding:3px 9px">🎯 יעד: ' + dateStr + '</span>';
  }

  var timeBadge = t.time ? '<span class="badge b-time">🕐 ' + esc(t.time) + '</span>' : '';
  var projBadge = t.project ? '<span class="badge b-proj">📁 ' + esc(t.project) + '</span>' : '';
  var assignBadge = t.assign ? '<span class="badge b-assign">👤 ' + esc(t.assign) + '</span>' : '';

  var recurBadge = '';
  if (t.recurring) {
    if (t.recurType === 'monthly' && t.recurMonthDays && t.recurMonthDays.length) {
      recurBadge = '<span class="badge b-recur">🗓️ חודשי: ' + t.recurMonthDays.slice().sort(function(a,b){return a-b;}).join(',') + '</span>';
    } else if (t.recurDays && t.recurDays.length) {
      var dn = ['א','ב','ג','ד','ה','ו','ש'];
      recurBadge = '<span class="badge b-recur">🔁 ' + t.recurDays.map(function(d){ return dn[d]; }).join(',') + '</span>';
    } else {
      recurBadge = '<span class="badge b-recur">🔁 חוזרת</span>';
    }
  }

  var tagsBadge = '';
  if (t.tags && t.tags.length) {
    t.tags.forEach(function(tag, i) {
      var c = TAG_COLORS[i % TAG_COLORS.length];
      tagsBadge += '<span class="badge" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'33">' + esc(tag) + '</span>';
    });
  }

  var offlineBadge = t._pendingSync ? '<span class="badge b-offline">⏳ ממתין לסנכרון</span>' : '';

  // Format createdAt for bottom row
  var createdRowStr = '';
  if (t.createdAt) {
    try {
      var cd2 = new Date(t.createdAt);
      if (!isNaN(cd2.getTime())) {
        createdRowStr = cd2.getDate() + '/' + (cd2.getMonth()+1) + '/' + cd2.getFullYear() +
          ' ' + String(cd2.getHours()).padStart(2,'0') + ':' + String(cd2.getMinutes()).padStart(2,'0');
      }
    } catch(e) {}
  }

  var datesRow = '';
  if (createdRowStr) {
    datesRow = '<div class="task-dates">' +
      '<span>✏️ נוצר: ' + createdRowStr + '</span>' +
    '</div>';
  }

  return '<div class="task-card ' + priClass + (t.done ? ' done' : '') + '" data-id="' + t.id + '" data-color="' + color + '">' +
    '<div class="task-check' + (t.done ? ' checked' : '') + '" onclick="toggleDone(' + t.id + ')">' + (t.done ? '✓' : '') + '</div>' +
    '<div class="task-body">' +
      '<div class="task-title">' + esc(t.title) + '</div>' +
      (t.desc ? '<div class="task-desc">' + esc(t.desc) + '</div>' : '') +
      '<div class="task-meta">' + priBadge + dateBadge + timeBadge + projBadge + recurBadge + assignBadge + tagsBadge + offlineBadge + '</div>' +
      datesRow +
    '</div>' +
    '<div class="task-actions">' +
      '<button class="btn-icon btn-cal" title="הוסף ליומן" onclick="addToCal(' + t.id + ')">📅</button>' +
      '<button class="btn-icon" onclick="openEdit(' + t.id + ')">✏️</button>' +
      '<button class="btn-icon btn-del" onclick="deleteTask(' + t.id + ')">🗑️</button>' +
    '</div>' +
  '</div>';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== STATS =====
function updateStats() {
  var today = new Date().toISOString().split('T')[0];
  var open = tasks.filter(function(t) { return !t.done; }).length;
  var overdue = tasks.filter(function(t) { return !t.done && t.deadline && t.deadline < today; }).length;
  var done = tasks.filter(function(t) { return t.done; }).length;
  var html = '<div class="stat-chip stat-open">📋 <b>' + open + '</b></div>';
  if (overdue) html += '<div class="stat-chip stat-overdue">⚠️ <b>' + overdue + '</b></div>';
  html += '<div class="stat-chip stat-done">✅ <b>' + done + '</b></div>';
  document.getElementById('headerStats').innerHTML = html;
}

// ===== LISTS =====
function refreshLists() {
  var projs = {}, tagsSeen = {};
  tasks.forEach(function(t) {
    if (t.project) projs[t.project] = 1;
    (t.tags||[]).forEach(function(tag) { tagsSeen[tag] = 1; });
  });
  var projArr = Object.keys(projs).sort();
  var tagArr = Object.keys(tagsSeen).sort();

  ['projList','projList2'].forEach(function(id) {
    var dl = document.getElementById(id);
    if (!dl) return;
    dl.innerHTML = projArr.map(function(p){ return '<option value="'+esc(p)+'">'; }).join('');
  });

  var ps = document.getElementById('projFilter');
  var cur = ps.value;
  ps.innerHTML = '<option value="">📁 כל הפרויקטים</option>' +
    projArr.map(function(p){ return '<option value="'+esc(p)+'">📁 '+esc(p)+'</option>'; }).join('');
  if (cur) ps.value = cur;

  var ts = document.getElementById('tagFilter');
  var tcur = ts.value;
  ts.innerHTML = '<option value="">🏷️ כל התגיות</option>' +
    tagArr.map(function(t){ return '<option value="'+esc(t)+'">🏷️ '+esc(t)+'</option>'; }).join('');
  if (tcur) ts.value = tcur;
}

// ===== TAGS =====
function handleTag(e, mode) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    var id = mode === 'new' ? 'newTagIn' : 'eTagIn';
    var val = document.getElementById(id).value.trim().replace(/,/g,'');
    if (!val) return;
    var arr = mode === 'new' ? _newTags : _editTags;
    if (!arr.includes(val)) arr.push(val);
    document.getElementById(id).value = '';
    renderTagsDisplay(mode);
    refreshLists();
  }
  if (e.key === 'Backspace' && e.target.value === '') {
    var arr = mode === 'new' ? _newTags : _editTags;
    if (arr.length) { arr.pop(); renderTagsDisplay(mode); }
  }
}

function renderTagsDisplay(mode) {
  var arr = mode === 'new' ? _newTags : _editTags;
  var id = mode === 'new' ? 'newTagsDisplay' : 'eTagsDisplay';
  document.getElementById(id).innerHTML = arr.map(function(tag, i) {
    var c = TAG_COLORS[i % TAG_COLORS.length];
    return '<span class="tag-chip" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'33" onclick="removeTag(\''+mode+'\','+i+')">'
      + esc(tag) + ' <span class="x">✕</span></span>';
  }).join('');
}

function removeTag(mode, idx) {
  if (mode === 'new') _newTags.splice(idx, 1);
  else _editTags.splice(idx, 1);
  renderTagsDisplay(mode);
}

// ===== RECURRING =====
// Build 1–31 month day buttons
function buildMonthGrid(gridId) {
  var grid = document.getElementById(gridId);
  if (!grid || grid.children.length > 0) return;
  for (var i = 1; i <= 31; i++) {
    var btn = document.createElement('button');
    btn.className = 'month-day-btn';
    btn.dataset.md = i;
    btn.textContent = i;
    btn.addEventListener('click', (function(b){ return function(){ b.classList.toggle('sel'); }; })(btn));
    grid.appendChild(btn);
  }
}

var _newRecurType = 'weekly';
var _editRecurType = 'weekly';

function setRecurType(mode, type) {
  if (mode === 'new') {
    _newRecurType = type;
    document.getElementById('newRecurTypeWeekly').classList.toggle('on', type === 'weekly');
    document.getElementById('newRecurTypeMonthly').classList.toggle('on', type === 'monthly');
    document.getElementById('recurDays').style.display = type === 'weekly' ? 'flex' : 'none';
    document.getElementById('recurMonthDays').style.display = type === 'monthly' ? 'block' : 'none';
    if (type === 'monthly') buildMonthGrid('newMonthDaysGrid');
  } else {
    _editRecurType = type;
    document.getElementById('editRecurTypeWeekly').classList.toggle('on', type === 'weekly');
    document.getElementById('editRecurTypeMonthly').classList.toggle('on', type === 'monthly');
    document.getElementById('eRecurDays').style.display = type === 'weekly' ? 'flex' : 'none';
    document.getElementById('eRecurMonthDays').style.display = type === 'monthly' ? 'block' : 'none';
    if (type === 'monthly') buildMonthGrid('editMonthDaysGrid');
  }
}

function toggleRecur() {
  var on = document.getElementById('chkRecur').checked;
  document.getElementById('recurPanel').style.display = on ? 'block' : 'none';
  if (!on) {
    document.querySelectorAll('#recurDays .day-btn').forEach(function(b){ b.classList.remove('sel'); });
    document.querySelectorAll('#newMonthDaysGrid .month-day-btn').forEach(function(b){ b.classList.remove('sel'); });
    _newRecurType = 'weekly';
    setRecurType('new', 'weekly');
  }
}
function toggleEditRecur() {
  var on = document.getElementById('eChkRecur').checked;
  document.getElementById('eRecurPanel').style.display = on ? 'block' : 'none';
  if (!on) {
    document.querySelectorAll('#eRecurDays .day-btn').forEach(function(b){ b.classList.remove('sel'); });
    document.querySelectorAll('#editMonthDaysGrid .month-day-btn').forEach(function(b){ b.classList.remove('sel'); });
    _editRecurType = 'weekly';
    setRecurType('edit', 'weekly');
  }
}

// ===== REMINDERS =====
function sendReminders() {
  var today = new Date().toISOString().split('T')[0];
  var overdue = tasks.filter(function(t){ return !t.done && t.deadline && t.deadline < today; });
  if (!overdue.length) { showToast('🎉 אין משימות באיחור!', var_green); return; }
  if (!isOnline) { showToast('❌ אין חיבור לאינטרנט', var_red); return; }
  var btn = document.getElementById('btnReminder');
  btn.textContent = '⏳ שולח...';
  btn.disabled = true;
  apiCall('sendReminders', null, function(msg) {
    showToast('✅ ' + (msg || 'נשלחו תזכורות'), var_green);
    btn.textContent = '🔔 תזכורת';
    btn.disabled = false;
  }, function(e) {
    showToast('שגיאה: ' + (e.message||''), var_red);
    btn.textContent = '🔔 תזכורת';
    btn.disabled = false;
  });
}

// ===== CALENDAR ADD =====
function addToCal(id) {
  var t = tasks.find(function(x){ return x.id === id; });
  if (!t) return;
  if (!isOnline) { showToast('❌ נדרש חיבור לאינטרנט', var_red); return; }
  if (!t.deadline && !confirm('אין תאריך יעד. להוסיף להיום?')) return;
  showToast('⏳ מוסיף ליומן...', var_green);
  apiCall('addToCalendar', { task: t }, function(res) {
    if (res && res.link) window.open(res.link, '_blank');
    showToast('✅ נוסף ליומן!', var_green);
  }, function(e) { showToast('שגיאה: ' + (e.message||''), var_red); });
}

// ===== CALENDAR VIEW =====
function setView(v) {
  var isCal = v === 'cal';
  document.getElementById('calWrap').classList.toggle('show', isCal);
  document.getElementById('listWrap').style.display = isCal ? 'none' : '';
  document.getElementById('btnList').classList.toggle('on', !isCal);
  document.getElementById('btnCal').classList.toggle('on', isCal);
  if (isCal) renderCalendar();
}

var calendarEvents = [];

function fetchCalendarEvents(year, month) {
  fetch(APPS_SCRIPT_URL + '?action=getCalendarEvents&year=' + year + '&month=' + month)
    .then(function(r){ return r.json(); })
    .then(function(d){
      calendarEvents = (d.data || d) || [];
      renderCalendarGrid(year, month);
    })
    .catch(function(){
      calendarEvents = [];
      renderCalendarGrid(year, month);
    });
}

function renderCalendar() {
  var now = new Date();
  if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth(); }
  // Render immediately with cached events, then update with fresh ones
  doRenderCalendar();
  fetch(APPS_SCRIPT_URL + '?action=getCalendarEvents&year=' + calYear + '&month=' + (calMonth+1))
    .then(function(r){ return r.json(); })
    .then(function(d){
      calendarEvents = (d.data || d) || [];
      doRenderCalendar(); // re-render with events
    })
    .catch(function(){ });
  return;
}
function doRenderCalendar() {
  var now = new Date();
  if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth(); }
  var mn = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  document.getElementById('calTitle').textContent = mn[calMonth] + ' ' + calYear;
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['א','ב','ג','ד','ה','ו','ש'].forEach(function(d){
    var el = document.createElement('div'); el.className = 'cal-day-name'; el.textContent = d; grid.appendChild(el);
  });
  var firstDay = new Date(calYear, calMonth, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  var todayStr = now.toISOString().split('T')[0];
  for (var i = 0; i < firstDay; i++) {
    var el = document.createElement('div'); el.className = 'cal-cell other-month'; grid.appendChild(el);
  }
  for (var d = 1; d <= daysInMonth; d++) {
    var ds = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var cell = document.createElement('div');
    cell.className = 'cal-cell' + (ds === todayStr ? ' today' : '');
    var num = document.createElement('div'); num.className = 'cal-cell-num'; num.textContent = d;
    cell.appendChild(num);
    tasks.filter(function(t){ return !t.done && t.deadline === ds && t.deadline.substring(0,4) > '1900'; }).slice(0,3).forEach(function(t){
      var dot = document.createElement('div');
      dot.className = 'cal-dot ' + (t.priority === 'גבוהה' ? 'high' : t.priority === 'נמוכה' ? 'low' : 'mid');
      dot.textContent = t.title;
      cell.appendChild(dot);
    });
    // Google Calendar events
    calendarEvents.filter(function(e){ return e.date === ds; }).slice(0,2).forEach(function(e){
      var dot = document.createElement('div');
      dot.className = 'cal-dot cal-event';
      dot.textContent = '📅 ' + e.title;
      cell.appendChild(dot);
    });
    (function(dateStr){ cell.addEventListener('click', function(){ openDayModal(dateStr); }); })(ds);
    grid.appendChild(cell);
  }
}

function openDayModal(dateStr) {
  var dayTasks = tasks.filter(function(t){ return t.deadline === dateStr; });
  var dayEvents = calendarEvents.filter(function(e){ return e.date === dateStr; });
  var dp = dateStr.split('-');
  var dn = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  document.getElementById('dayModalTitle').textContent = 'יום ' + dn[new Date(dateStr).getDay()] + ' — ' + dp[2]+'/'+dp[1];
  if (!dayTasks.length && !dayEvents.length) {
    document.getElementById('dayModalContent').innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px">אין משימות ליום זה</div>';
  } else {
    dayTasks.sort(function(a,b){ return (a.time||'99').localeCompare(b.time||'99'); });
    var html = dayTasks.map(function(t) {
      var pc = t.priority === 'גבוהה' ? 'var(--red)' : t.priority === 'נמוכה' ? 'var(--green)' : 'var(--yellow)';
      return '<div style="padding:12px;border:1px solid var(--border);border-right:3px solid '+pc+';border-radius:8px;margin-bottom:8px'+(t.done?';opacity:.45':'')+'">'+
        '<div style="display:flex;justify-content:space-between"><span style="font-weight:700">'+ esc(t.title)+'</span>'+(t.time?'<span style="color:var(--cyan);font-size:.8rem">🕐 '+t.time+'</span>':'')+'</div>'+
        (t.desc?'<div style="font-size:.76rem;color:var(--text2);margin-top:4px">'+esc(t.desc)+'</div>':'')+
        '</div>';
    }).join('');
    // Add Google Calendar events
    var evHtml = dayEvents.map(function(e){
      return '<div style="background:rgba(130,80,220,.15);border-right:3px solid #b794f4;padding:8px 12px;border-radius:6px;margin-bottom:6px">' +
        '<div style="font-weight:600;color:#b794f4">📅 ' + esc(e.title) + '</div>' +
        (e.time ? '<div style="font-size:.8rem;color:var(--text3)">' + e.time + '</div>' : '') +
        '</div>';
    }).join('');
    document.getElementById('dayModalContent').innerHTML = evHtml + html;
  }
  document.getElementById('dayModal').classList.add('on');
}

function calPrev() { if (--calMonth < 0) { calMonth=11; calYear--; } renderCalendar(); }
function calNext() { if (++calMonth > 11) { calMonth=0; calYear++; } renderCalendar(); }

// ===== TOAST =====
function showToast(msg, color) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = color || 'var(--accent)';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.remove('show'); }, 2800);
}

// ===== KEYBOARD =====
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('newTitle').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTask();
  });
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEdit();
  });
  document.getElementById('confirmModal').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
  });
  document.getElementById('dayModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('on');
  });

  // Load pending sync
  var ps = localStorage.getItem('pending_sync');
  if (ps) try { pendingSync = JSON.parse(ps); } catch(e) {}

  init();
});
</script>
